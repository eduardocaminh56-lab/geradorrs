<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Keys Oficial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0b0f19 100%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 1rem;
        }

        header h1 {
            color: #3b82f6;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: rgba(15, 23, 42, 0.9);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #f1f5f9;
            border-left: 4px solid #3b82f6;
            padding-left: 10px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }

        .btn-blue {
            background-color: #3b82f6;
        }

        .btn-blue:hover {
            background-color: #2563eb;
        }

        .btn-green {
            background-color: #10b981;
        }

        .btn-green:hover {
            background-color: #059669;
        }

        .result-box {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .success {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid #10b981;
        }

        .error {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .history-card {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            background-color: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        tr:hover {
            background-color: rgba(51, 65, 85, 0.2);
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-green { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
        .badge-red { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }

        .key-text {
            font-family: monospace;
            color: #38bdf8;
            cursor: pointer;
        }

        .key-text:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Painel de Chaves & Validação</h1>
            <p>Gerenciador de chaves com opção de 1 minuto inclusa para testes</p>
        </header>

        <div class="grid">
            <!-- GERADOR DE KEYS (ADMIN) -->
            <div class="card">
                <h2>Gerador de Keys (Admin)</h2>
                <div class="form-group">
                    <label for="timeSelect">Duração da Key:</label>
                    <select id="timeSelect">
                        <option value="1m">1 Minuto</option>
                        <option value="1h">1 Hora</option>
                        <option value="1d">1 Dia</option>
                        <option value="3d">3 Dias</option>
                        <option value="7d">7 Dias</option>
                        <option value="15d">15 Dias</option>
                        <option value="30d">30 Dias</option>
                    </select>
                </div>
                <button class="btn-blue" onclick="criarNovaKey()">Gerar Nova Key</button>
                <div id="genResult" class="result-box success"></div>
            </div>

            <!-- VALIDADOR DE KEYS -->
            <div class="card">
                <h2>Testar / Ativar Key</h2>
                <div class="form-group">
                    <label for="keyInput">Insira a Key gerada:</label>
                    <input type="text" id="keyInput" placeholder="XXXX-XXXX-XXXX-XXXX">
                </div>
                <button class="btn-green" onclick="ativarChaveUsuario()">Ativar Chave no Sistema</button>
                <div id="valResult" class="result-box"></div>
            </div>
        </div>

        <!-- HISTÓRICO GLOBAL -->
        <div class="card history-card">
            <h2>Histórico Global de Keys</h2>
            <table id="keysTable">
                <thead>
                    <tr>
                        <th>Key</th>
                        <th>Duração</th>
                        <th>Status</th>
                        <th>Data Criação</th>
                        <th>Expiração / Uso</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <!-- Gerado Dinamicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let bancoChaves = JSON.parse(localStorage.getItem('banco_keys_ff')) || [];

        function salvarNoStorage() {
            localStorage.setItem('banco_keys_ff', JSON.stringify(bancoChaves));
            atualizarTabela();
        }

        function gerarCodigoAleatorio() {
            const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            function bloco() {
                let str = "";
                for(let i=0; i<4; i++) {
                    str += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
                }
                return str;
            }
            return `${bloco()}-${bloco()}-${bloco()}-${bloco()}`;
        }

        function getTextoDuracao(duracao) {
            if (duracao === '1m') return '1 Minuto';
            if (duracao === '1h') return '1 Hora';
            if (duracao === '1d') return '1 Dia';
            if (duracao === '3d') return '3 Dias';
            if (duracao === '7d') return '7 Dias';
            if (duracao === '15d') return '15 Dias';
            if (duracao === '30d') return '30 Dias';
            return duracao;
        }

        function criarNovaKey() {
            const duracao = document.getElementById('timeSelect').value;
            const novaKey = {
                codigo: gerarCodigoAleatorio(),
                duracao: duracao,
                status: 'Disponível',
                dataCriacao: new Date().toLocaleString('pt-BR'),
                dataExpiracao: '-'
            };

            bancoChaves.push(novaKey);
            salvarNoStorage();

            const genResult = document.getElementById('genResult');
            genResult.style.display = 'block';
            genResult.className = 'result-box success';
            
            genResult.innerText = `Gerada: ${novaKey.codigo} (${getTextoDuracao(duracao)})`;
        }

        function activarKeyFisica(codigoKey, duracao) {
            const agora = new Date();
            if (duracao === '1m') {
                agora.setMinutes(agora.getMinutes() + 1);
            } else if (duracao === '1h') {
                agora.setHours(agora.getHours() + 1);
            } else if (duracao === '1d') {
                agora.setDate(agora.getDate() + 1);
            } else if (duracao === '3d') {
                agora.setDate(agora.getDate() + 3);
            } else if (duracao === '7d') {
                agora.setDate(agora.getDate() + 7);
            } else if (duracao === '15d') {
                agora.setDate(agora.getDate() + 15);
            } else if (duracao === '30d') {
                agora.setDate(agora.getDate() + 30);
            }
            return agora.toLocaleString('pt-BR');
        }

        function ativarChaveUsuario() {
            const input = document.getElementById('keyInput').value.trim();
            const valResult = document.getElementById('valResult');
            valResult.style.display = 'block';

            if(!input) {
                valResult.className = 'result-box error';
                valResult.innerText = 'Por favor, insira uma key.';
                return;
            }

            const chaveEncontrada = bancoChaves.find(k => k.codigo === input);

            if (!chaveEncontrada) {
                valResult.className = 'result-box error';
                valResult.innerText = 'Key não encontrada no banco de dados!';
                return;
            }

            if (chaveEncontrada.status === 'Utilizada') {
                valResult.className = 'result-box error';
                valResult.innerText = `Esta Key já foi utilizada em: ${chaveEncontrada.dataExpiracao}`;
                return;
            }

            chaveEncontrada.status = 'Utilizada';
            chaveEncontrada.dataExpiracao = activarKeyFisica(chaveEncontrada.codigo, chaveEncontrada.duracao);
            
            salvarNoStorage();

            valResult.className = 'result-box success';
            valResult.innerText = `Sucesso! Acesso liberado até: ${chaveEncontrada.dataExpiracao}`;
        }

        function copiarTexto(texto) {
            navigator.clipboard.writeText(texto);
            alert('Chave copiada com sucesso: ' + texto);
        }

        function atualizarTabela() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';

            if(bancoChaves.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#64748b;">Nenhuma key gerada até o momento.</td></tr>';
                return;
            }

            [...bancoChaves].reverse().forEach(key => {
                const tr = document.createElement('tr');
                const badgeClass = key.status === 'Disponível' ? 'badge-green' : 'badge-red';
                
                tr.innerHTML = `
                    <td class="key-text" onclick="copiarTexto('${key.codigo}')" title="Clique para copiar">${key.codigo}</td>
                    <td>${getTextoDuracao(key.duracao)}</td>
                    <td><span class="badge ${badgeClass}">${key.status}</span></td>
                    <td>${key.dataCriacao}</td>
                    <td>${key.dataExpiracao}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        atualizarTabela();
    </script>
</body>
</html>
